<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AccessibleIconGenerator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="code.js"></script>
<script src="modules/speech.js"></script>

</head>

<body>

<div id="notification-area" aria-live="assertive" aria-atomic="true"></div>

<h1>AccessibleIconGenerator</h1>

<label for="iconStyle">Icon style</label><br>

<select id="iconStyle" onchange="toggleCustomText()">
<option value="123">123</option>
<option value="?">?</option>
<option value="custom">Custom text</option>
</select>

<div id="customTextSection" style="display:none">

<label for="customText">Custom text</label><br>
<input id="customText" type="text">

</div>

<br><br>

<label for="bgColor">Background color</label><br>

<select id="bgColor">
<option value="#000000">Black</option>
<option value="#ffffff">White</option>
<option value="#0044cc">Blue</option>
<option value="#008800">Green</option>
<option value="#880000">Red</option>
<option value="#444444">Gray</option>
</select>

<br><br>

<label for="textColor">Text color</label><br>

<select id="textColor">
<option value="#ffffff">White</option>
<option value="#000000">Black</option>
<option value="#ffff00">Yellow</option>
<option value="#00ffff">Cyan</option>
<option value="#ff8800">Orange</option>
</select>

<br><br>

<fieldset>

<legend>Icon sizes</legend>

<label><input type="checkbox" value="48"> 48</label><br>
<label><input type="checkbox" value="72"> 72</label><br>
<label><input type="checkbox" value="96"> 96</label><br>
<label><input type="checkbox" value="128"> 128</label><br>
<label><input type="checkbox" value="144"> 144</label><br>
<label><input type="checkbox" value="192" checked> 192</label><br>
<label><input type="checkbox" value="256"> 256</label><br>
<label><input type="checkbox" value="384"> 384</label><br>
<label><input type="checkbox" value="512" checked> 512</label><br>

</fieldset>

<br>

<button onclick="generatePreview()">Generate icon Preview</button><br>
<button onclick="downloadIcons()">Generate Icon Pack</button><br>

<div id="previewSection" style="display:none">

<h2>Preview</h2>

<canvas id="previewCanvas" width="192" height="192" aria-label="Icon preview"></canvas>

</div>

<div id="downloadSection" style="display:none">

<h2>Download</h2>

<div id="downloads"></div>

</div>

</body>
</html>
